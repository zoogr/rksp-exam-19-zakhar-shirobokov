server:
  port: 8081

spring:
  application:
    name: processor-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: manual  # Ручное подтверждение для надёжности
        concurrency: 3
        max-concurrency: 10

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/events_db
    username: ${POSTGRES_USER:events_user}
    password: ${POSTGRES_PASSWORD:events_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate  # Не создаём таблицы автоматически, используем скрипты
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never  # Используем ручные скрипты

clickhouse:
  url: jdbc:clickhouse://${CLICKHOUSE_HOST:localhost}:${CLICKHOUSE_PORT:8123}/default
  username: ${CLICKHOUSE_USER:default}
  password: ${CLICKHOUSE_PASSWORD:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    ru.rksp: DEBUG
    org.hibernate.SQL: DEBUG